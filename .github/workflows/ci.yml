name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run-real-codex:
        description: "Run opt-in real Codex examples and integration tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Pylint
        run: make pylint

      - name: Type check
        run: make type

      - name: Test
        run: make test

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run offline examples
        run: make examples-offline

      - name: Build distributions
        run: make package-check

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          if-no-files-found: error

  real-codex:
    name: Real Codex smoke tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-real-codex }}
    env:
      LANGGRAPH_CODEX_RUN_REAL_CODEX: "1"
      OPEN_AI_SECRET_KEY: ${{ secrets.OPEN_AI_SECRET_KEY }}
      OPEN_AI_KEY_NAME: github-actions
      OPEN_AI_MODEL: ""
      OPENAI_API_KEY: ${{ secrets.OPEN_AI_SECRET_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run real Codex checks
        run: make check-codex
